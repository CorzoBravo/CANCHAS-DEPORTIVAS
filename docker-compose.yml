version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: canchas-postgres-prod
    environment:
      - POSTGRES_USER=canchas_user
      - POSTGRES_PASSWORD=canchas_password
      - POSTGRES_DB=canchas_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=4000
      
      - DATABASE_URL=postgresql://canchas_user:canchas_password@postgres:5432/canchas_db?schema=public
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always

volumes:
  postgres_data_prod:
